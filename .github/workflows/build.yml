name: Docker Hub

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "next.config.*"
      - "postcss.config.*"
      - "tsconfig.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: kt-frontend-svc

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require NEXT_PUBLIC_API_GATEWAY_URL
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_API_GATEWAY_URL }}" ]; then
            echo "Set repository variable NEXT_PUBLIC_API_GATEWAY_URL to your public ingress URL (https://…)." >&2
            echo "Settings → Secrets and variables → Actions → Variables." >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_GATEWAY_URL=${{ vars.NEXT_PUBLIC_API_GATEWAY_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
